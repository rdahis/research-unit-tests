name: Validate tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate test files
        run: python scripts/validate.py

      - name: Check registry is up to date
        run: |
          python scripts/registry-build.py
          git diff --exit-code registry.yaml || (echo "registry.yaml is out of date — run 'python scripts/registry-build.py' and commit the result" && exit 1)
