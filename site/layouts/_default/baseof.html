<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Params.name }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <header>
    <div class="container">
      <a href="{{ "" | relURL }}" class="site-title">Research Unit Tests</a>
      <nav>
        <a href="{{ "quick-start/" | relURL }}">Quick Start</a>
        <a href="{{ "contributing/" | relURL }}">Contributing</a>
        <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    <div class="container">
      <p>Open source. <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener">Contribute on GitHub.</a></p>
    </div>
  </footer>
</body>
</html>
